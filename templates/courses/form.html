{% extends 'base.html' %}

{% block title %}{% if course %}Edit{% else %}Add{% endif %} Course - StudentMS{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <h1 class="h2 mb-4">{% if course %}✏️ Edit{% else %}➕ Add{% endif %} Course</h1>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">📚 Course Name</label>
                            <input type="text" name="name" class="form-control" value="{{ course.name|default:'' }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">🔖 Course Code</label>
                            <input type="text" name="code" class="form-control" value="{{ course.code|default:'' }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">⏱️ Duration (Months)</label>
                            <input type="number" name="duration_months" class="form-control" value="{{ course.duration_months|default:12 }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">📝 Description</label>
                            <textarea name="description" class="form-control" rows="4">{{ course.description|default:'' }}</textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">✅ {{ course|yesno:"Update,Create" }} Course</button>
                            <a href="{% url 'list_courses' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
