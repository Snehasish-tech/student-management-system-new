{% extends 'base.html' %}

{% block title %}Add Results - StudentMS{% endblock %}

{% block content %}
<section class="section-wrap">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card-surface p-4 p-md-5">
                <h2 class="mb-1">Add Marks</h2>
                <p class="tiny-muted mb-4">Result grades are auto-calculated based on marks.</p>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Student</label>
                        <select name="student" class="form-select" required>
                            <option value="">Select Student</option>
                            {% for student in students %}
                                <option value="{{ student.user_id }}">{{ student.user.get_full_name }} ({{ student.roll_number }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <select name="subject" class="form-select" required>
                            <option value="">Select Subject</option>
                            {% for subject in subjects %}
                                <option value="{{ subject.id }}">{{ subject.name }} ({{ subject.course.code }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Marks</label>
                        <input type="number" name="marks" class="form-control" min="0" max="100" step="0.5" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Remarks (Optional)</label>
                        <textarea name="remarks" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary-soft">Save Marks</button>
                        <a href="{% url 'teacher_dashboard' %}" class="btn btn-outline-soft">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
